<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — SpeakFlow</title>

  <link rel="stylesheet" href="style.css" />

  <style>

      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
a {
  color: inherit;
  text-decoration: none;
}

a:visited {
  color: inherit;
}

a:hover {
  opacity: 0.8;
}

a:active {
  color: inherit;
}
  
  margin: 0;
}

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #1e1b4b, #0b0a1a 70%);
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 20px;

      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);

      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .auth-title {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: #9aa0a6;
      margin-bottom: 25px;
    }

    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #9aa0a6;
      cursor: pointer;
      transition: 0.3s;
    }

    .tab.active {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
    }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .auth-form.active {
      display: flex;
    }

    .auth-form input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      color: white;
      outline: none;
      transition: 0.2s;
    }

    .auth-form input:focus {
      border-color: #7c83ff;
      box-shadow: 0 0 0 2px rgba(124,131,255,0.2);
    }

    .btn {
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      margin-top: 10px;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      font-size: 13px;
      color: #9aa0a6;
      text-decoration: none;
    }

    .back-link:hover {
      color: white;
    }
  </style>
</head>

<body>
  <section class="auth-page">
    <div class="auth-card">

      <h2 class="auth-title">SpeakFlow</h2>
      <p class="auth-subtitle">
        Войди или создай аккаунт, чтобы начать говорить по-английски
      </p>

      <div class="auth-tabs">
        <button class="tab active" onclick="switchTab('login')">Вход</button>
        <button class="tab" onclick="switchTab('register')">Регистрация</button>
      </div>

      <!-- LOGIN -->
      <form id="login" class="auth-form active">
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Пароль" required />
        <button class="btn btn-primary">Войти</button>
      </form>

      <!-- REGISTER -->
      <form id="register" class="auth-form">
        <input type="text" placeholder="Имя" required />
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Пароль" required />
        <button class="btn btn-primary">Создать аккаунт</button>
      </form>

      <a href="index.html" class="back-link">← Вернуться на главную</a>

    </div>
  </section>

  <script>
    function switchTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

      document.querySelector(`[onclick="switchTab('${id}')"]`).classList.add('active');
      document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
